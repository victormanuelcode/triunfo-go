<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proveedores - TRIUNFO GO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/styles.css">
    </head>
<body>
    <script src="../../js/auth.js"></script>
    <script src="../../js/layout_admin.js"></script>

    <div class="layout-root">
        <aside class="sidebar"></aside>

        <div class="content-area">
            <header class="topbar"></header>

            <main class="content-inner">
                <div class="page-title">
                    <div>
                        <h1>Proveedores</h1>
                        <p class="page-subtitle">Gestión de proveedores y contactos comerciales</p>
                    </div>
                </div>

                <section class="card-admin">
                    <div class="card-admin-header">
                        <div>
                            <div class="card-admin-title">Listado de Proveedores</div>
                            <div class="card-admin-subtitle">Administra la información de tus proveedores</div>
                        </div>
                        <div class="inventory-actions">
                            <div class="filter-input-wrapper">
                                <span class="search-icon">🔍</span>
                                <input type="text" id="buscador" placeholder="Buscar por nombre o NIT..." onkeyup="filtrarProveedores()">
                            </div>
                            <button class="btn-primary" id="btnNuevoProveedor">Nuevo Proveedor</button>
                        </div>
                    </div>

                    <div class="table-container">
                        <table id="tablaProveedores" class="data-table">
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>NIT</th>
                                    <th>Teléfono</th>
                                    <th>Email</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <!-- Modal Proveedor -->
    <div id="modalProveedor" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modalTitle">Nuevo Proveedor</h2>
            <form id="formProveedor">
                <input type="hidden" id="idProveedor">
                <div class="form-group">
                    <label>Nombre Empresa/Proveedor *</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="form-group">
                    <label>NIT</label>
                    <input type="text" id="nit">
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="text" id="telefono">
                </div>
                <div class="form-group">
                    <label>Dirección</label>
                    <input type="text" id="direccion">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary btn-cancel">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/proveedores.js"></script>
    <script>
        (function () {
            if (!localStorage.getItem('sesion_activa')) {
                window.location.href = '../auth/login.html';
                return;
            }

            var nombre = localStorage.getItem('usuario_nombre') || 'Administrador';
            var email = localStorage.getItem('usuario_email') || 'admin@triunfo.go';
            var inicial = nombre.trim().charAt(0).toUpperCase();

            var avatar = document.getElementById('adminAvatar');
            var avatarTop = document.getElementById('adminAvatarTop');
            var nombreEl = document.getElementById('adminName');
            var emailEl = document.getElementById('adminEmail');

            if (avatar) avatar.textContent = inicial;
            if (avatarTop) avatarTop.textContent = inicial;
            if (nombreEl) nombreEl.textContent = nombre;
            if (emailEl) emailEl.textContent = email;
        })();
    </script>
</body>
</html>
