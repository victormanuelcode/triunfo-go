<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket de Venta</title>
    <link rel="stylesheet" href="../../css/ticket.css">
</head>
<body>
    <div id="ticket-content">
        <div class="header">
            <h2>TRIUNFO GO</h2>
            <p>NIT: 900.123.456-7</p>
            <p>Dirección: Calle Principal #123</p>
            <p>Tel: (601) 123 4567</p>
        </div>
        <div class="info">
            <div><span>Factura:</span> <span id="t-numero">...</span></div>
            <div><span>Fecha:</span> <span id="t-fecha">...</span></div>
            <div><span>Cajero:</span> <span id="t-cajero">...</span></div>
            <div><span>Cliente:</span> <span id="t-cliente">...</span></div>
        </div>
        <table class="items-table">
            <thead>
                <tr>
                    <th class="col-cant">Cant</th>
                    <th class="col-desc">Desc</th>
                    <th class="col-price">Total</th>
                </tr>
            </thead>
            <tbody id="t-items">
                <!-- Items -->
            </tbody>
        </table>
        <div class="totals">
            <div><span>Subtotal:</span> <span id="t-subtotal">$0</span></div>
            <!-- Si hubiera impuestos -->
            <div class="total-final"><span>TOTAL:</span> <span id="t-total">$0</span></div>
            <div style="margin-top:5px; font-size:11px;"><span>Pago:</span> <span id="t-metodo">...</span></div>
        </div>
        <div class="footer">
            <p>¡Gracias por su compra!</p>
            <p>Conserve este ticket para cambios o garantías.</p>
        </div>
    </div>

    <div class="no-print">
        <button onclick="window.print()">Imprimir</button>
        <button onclick="window.close()" style="background:#666;">Cerrar</button>
    </div>

    <script>
        const API_URL = '/proyecto_final/backend';

        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) {
                document.body.innerHTML = '<p>Error: No se especificó factura.</p>';
                return;
            }

            try {
                // Usamos fetch directo, asumiendo que el token está en localStorage si se requiere auth
                // Pero como es una ventana nueva, debemos leer el token del localStorage
                const token = localStorage.getItem('token');
                const headers = token ? { 'Authorization': `Bearer ${token}` } : {};

                const response = await fetch(`${API_URL}/invoices/${id}`, { headers });
                if (!response.ok) throw new Error('No se pudo cargar la factura');

                const data = await response.json();
                renderTicket(data);
                
                // Auto-imprimir después de un breve delay para asegurar renderizado
                setTimeout(() => window.print(), 500);

            } catch (error) {
                console.error(error);
                document.body.innerHTML = '<p>Error cargando datos de la factura.</p>';
            }
        });

        function renderTicket(factura) {
            document.getElementById('t-numero').textContent = factura.numero_factura;
            document.getElementById('t-fecha').textContent = new Date(factura.fecha).toLocaleString();
            document.getElementById('t-cajero').textContent = factura.usuario_nombre || 'General';
            document.getElementById('t-cliente').textContent = factura.cliente_nombre || 'Público General';
            document.getElementById('t-metodo').textContent = (factura.metodo_pago || 'Efectivo').toUpperCase();
            
            const total = parseFloat(factura.total);
            document.getElementById('t-total').textContent = formatMoney(total);
            document.getElementById('t-subtotal').textContent = formatMoney(total); // Simplificado sin impuestos por ahora

            const tbody = document.getElementById('t-items');
            tbody.innerHTML = '';
            
            // Los detalles vienen en factura.detalles (si el backend lo devuelve así, verificaremos)
            // InvoiceController getOne devuelve "detalles" => $this->invoice->detalles
            // Invoice::readOne llena $this->detalles
            
            // Debemos asegurar que el backend devuelva los detalles.
            // Según el código leído, Invoice::readOne() llama a una query para detalles?
            // Revisa Invoice.php de nuevo si es necesario.
            // Asumiremos que sí. Si no, lo arreglamos.
            
            // Nota: Invoice.php readOne() en el código que leí NO mostraba la parte de cargar detalles.
            // Se cortaba en "// 2. Obtener detalles". 
            // Voy a asumir que está implementado, si falla lo corregiré.
            
            // Simulamos si no hay detalles (aunque debería haber)
            const items = factura.detalles || [];
            
            items.forEach(item => {
                const tr = document.createElement('tr');
                const loteTxt = item.lote_id ? ` Lote:${item.lote_numero ? item.lote_numero : ('#' + item.lote_id)}` : '';
                tr.innerHTML = `
                    <td class="col-cant">${item.cantidad}</td>
                    <td class="col-desc">${(item.producto_nombre || 'Item') + loteTxt}</td>
                    <td class="col-price">${formatMoney(item.subtotal)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function formatMoney(amount) {
            return '$' + parseFloat(amount).toLocaleString('es-CO', {minimumFractionDigits: 0});
        }
    </script>
</body>
</html>
