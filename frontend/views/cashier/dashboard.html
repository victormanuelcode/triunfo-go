<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Cajero - Triunfo Go</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/cashier_dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header con Bienvenida -->
        <div class="welcome-section">
            <div class="welcome-text">
                <h1 id="userWelcome">Hola, Cajero 👋</h1>
                <p id="currentDate">Martes, 17 de Febrero 2026</p>
            </div>
            <div class="status-badge" id="boxStatusBadge">
                <div class="status-dot"></div>
                <span id="boxStatusText">Caja Cerrada</span>
            </div>
        </div>

        <!-- Estadísticas Rápidas -->
        <div class="stats-overview">
            <div class="stat-box">
                <div class="stat-icon-wrapper bg-blue">
                    <i class="fas fa-receipt"></i>
                </div>
                <div class="stat-content">
                    <h3 id="salesCount">0</h3>
                    <p>Ventas Hoy</p>
                </div>
            </div>
            <div class="stat-box">
                <div class="stat-icon-wrapper bg-green">
                    <i class="fas fa-coins"></i>
                </div>
                <div class="stat-content">
                    <h3 id="totalSales">$0.00</h3>
                    <p>Total Recaudado</p>
                </div>
            </div>
            <div class="stat-box">
                <div class="stat-icon-wrapper bg-orange">
                    <i class="fas fa-box-open"></i>
                </div>
                <div class="stat-content">
                    <h3 id="lowStockCount">0</h3>
                    <p>Productos Stock Bajo</p>
                </div>
            </div>
        </div>

        <h2 style="margin: 30px 0 20px; color: #2c3e50;">Acciones Principales</h2>

        <!-- Acciones Rápidas -->
        <div class="quick-actions">
            <a href="ventas.html" class="action-card">
                <div class="action-icon"><i class="fas fa-cash-register"></i></div>
                <div class="action-title">Punto de Venta</div>
                <div class="action-desc">Registrar nueva venta</div>
            </a>
            
            <a href="#" class="action-card" onclick="toggleBox()">
                <div class="action-icon"><i class="fas fa-lock"></i></div>
                <div class="action-title" id="boxActionTitle">Abrir Caja</div>
                <div class="action-desc">Gestionar turno</div>
            </a>

            <a href="#" class="action-card" onclick="showProfile()">
                <div class="action-icon"><i class="fas fa-user-circle"></i></div>
                <div class="action-title">Mi Perfil</div>
                <div class="action-desc">Ver datos personales</div>
            </a>

            <a href="#" class="action-card" onclick="logout()">
                <div class="action-icon" style="color: #e74c3c;"><i class="fas fa-sign-out-alt"></i></div>
                <div class="action-title">Cerrar Sesión</div>
                <div class="action-desc">Salir del sistema</div>
            </a>
        </div>
    </div>

    <script src="../../js/auth.js"></script>
    <script src="../../js/dashboard_cashier.js"></script>
</body>
</html>
