<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mi Perfil</title>
    <link rel="stylesheet" href="../../css/styles.css"/>
</head>
<body>
    <div class="layout-root">
        <aside class="sidebar"></aside>
        <div class="content-area">
            <header class="topbar"></header>
            <main class="content-inner">
                <div class="page-title">
                    <div>
                        <h1>Mi Perfil</h1>
                        <p>Actualiza tus datos de contacto y preferencias.</p>
                    </div>
                </div>

                <div id="admin-toast"></div>

                <div class="card max-w-720">
                    <form id="perfilForm" class="form-grid">
                        <div class="form-group grid-span-all">
                            <label>Avatar</label>
                            <div class="perfil-avatar-row">
                                <img id="pf-avatar-preview" src="" alt="avatar">
                                <input type="file" id="pf-avatar-file" accept="image/*">
                                <button type="button" id="pf-avatar-btn" class="btn-light">Subir imagen</button>
                                <button type="button" id="pf-avatar-clear" class="btn-outline">Quitar</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="pf-email" required />
                        </div>
                        <div class="form-group">
                            <label>Teléfono</label>
                            <input type="text" id="pf-telefono" />
                        </div>
                        <div class="form-group">
                            <label>Avatar URL</label>
                            <input type="text" id="pf-avatar" placeholder="https://..."/>
                        </div>
                        <div class="form-group">
                            <label>Preferencias</label>
                            <div>
                                <label class="inline-check">
                                    <input type="checkbox" id="pf-pref-collapse"/> Colapsar menú lateral
                                </label>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-primary">Guardar</button>
                        </div>
                    </form>

                    <div class="alert" id="pf-restriccion">
                        El nombre y la contraseña solo pueden ser cambiados por el Administrador.
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../js/auth.js"></script>
    <script src="../../js/layout_admin.js"></script>
    <script src="../../js/perfil.js"></script>
</body>
</html>
