<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - TRIUNFO GO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/login.css">
    <script src="../../js/theme-init.js"></script>
    <link rel="stylesheet" href="../../css/theme.css">
</head>
<body>
    <div class="login-background">
        <div class="login-wrapper">
            <div class="login-card">
                <div class="login-logo">
                    <div class="logo-square">
                        <span class="logo-leaf">🌿</span>
                    </div>
                    <div class="logo-text">
                        <h1>TRIUNFOGO</h1>
                        <p>Gestión Agrícola</p>
                    </div>
                </div>

                <div class="login-header">
                    <h2 id="tituloPaso">Recuperar contraseña</h2>
                    <p id="subtituloPaso">Ingresa tu correo y te enviaremos un código de verificación</p>
                </div>

                <div class="pasos-indicador">
                    <span class="paso activo" data-paso="1">1</span>
                    <span class="paso-linea"></span>
                    <span class="paso" data-paso="2">2</span>
                </div>

                <!-- Paso 1: Solicitar código -->
                <form id="formSolicitarCodigo" class="login-form paso-form activo">
                    <div class="campo">
                        <label for="emailRecuperacion">Correo electrónico</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="currentColor"/>
                                </svg>
                            </span>
                            <input type="email" id="emailRecuperacion" name="email" placeholder="tu@correo.com" required autocomplete="email">
                        </div>
                    </div>
                    <div id="mensajeAlerta1" class="alerta"></div>
                    <div id="mensajeExito1" class="alerta-exito"></div>
                    <button type="submit" class="boton-ingresar" id="btnEnviarCodigo">Enviar código</button>
                </form>

                <!-- Paso 2: Código + nueva contraseña -->
                <form id="formRestablecer" class="login-form paso-form">
                    <div class="campo">
                        <label for="emailConfirmacion">Correo electrónico</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="currentColor"/>
                                </svg>
                            </span>
                            <input type="email" id="emailConfirmacion" name="email" readonly>
                        </div>
                    </div>
                    <div class="campo">
                        <label for="codigoVerificacion">Código de verificación</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M18 8h-1V6a3 3 0 0 0-6 0v2H8a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2zm-5-2a1 1 0 0 1 2 0v2h-2V6zm5 12H8v-8h10v8z" fill="currentColor"/>
                                </svg>
                            </span>
                            <input type="text" id="codigoVerificacion" name="codigo" placeholder="000000" maxlength="6" inputmode="numeric" pattern="\d{6}" required autocomplete="one-time-code">
                        </div>
                        <small class="campo-ayuda">Revisa tu bandeja de entrada. El código expira en 15 minutos.</small>
                    </div>
                    <div class="campo">
                        <label for="nuevaContrasena">Nueva contraseña</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M17 8h-1V6a4 4 0 0 0-8 0v2H7a1 1 0 0 0-1 1v11a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V9a1 1 0 0 0-1-1zm-7-2a2 2 0 0 1 4 0v2h-4V6zm6 13H8V10h8v9z" fill="currentColor"/>
                                </svg>
                            </span>
                            <input type="password" id="nuevaContrasena" name="contrasena" placeholder="Mínimo 6 caracteres" minlength="6" required autocomplete="new-password">
                        </div>
                    </div>
                    <div class="campo">
                        <label for="confirmarContrasena">Confirmar contraseña</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M17 8h-1V6a4 4 0 0 0-8 0v2H7a1 1 0 0 0-1 1v11a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V9a1 1 0 0 0-1-1zm-7-2a2 2 0 0 1 4 0v2h-4V6zm6 13H8V10h8v9z" fill="currentColor"/>
                                </svg>
                            </span>
                            <input type="password" id="confirmarContrasena" name="contrasena_confirmacion" placeholder="Repite la contraseña" minlength="6" required autocomplete="new-password">
                        </div>
                    </div>
                    <div id="mensajeAlerta2" class="alerta"></div>
                    <div id="mensajeExito2" class="alerta-exito"></div>
                    <button type="submit" class="boton-ingresar" id="btnRestablecer">Cambiar contraseña</button>
                    <button type="button" class="boton-secundario" id="btnReenviarCodigo">Reenviar código</button>
                </form>

                <div class="login-footer-link">
                    <a href="login.html">← Volver al inicio de sesión</a>
                </div>
            </div>
        </div>
    </div>
    <script src="../../js/recuperar-contrasena.js"></script>
</body>
</html>
